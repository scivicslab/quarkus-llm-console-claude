# quarkus-llm-console-claude configuration
quarkus.http.port=8090


# Static resources served from META-INF/resources/
# NOTE: HTTP compression is disabled to prevent Vert.x buffering of SSE streams.
quarkus.http.enable-compression=false

# Disable browser caching for static files (ensures JS/CSS updates are reflected immediately)
quarkus.http.static-resources.caching-enabled=false

# SSE connections need long idle timeout (default 30s is too short)
quarkus.http.idle-timeout=PT0S

# Claude CLI allowed tools (auto-approved, no permission prompt).
# Comma-separated list. Empty = no auto-approved tools (all tools prompt for permission).
llm-console.allowed-tools=Bash,Read,Write,Edit,Glob,Grep,WebSearch,WebFetch

# Application title (displayed in browser header and tab)
llm-console.title=LLM Console - Claude

# Session persistence file (saves Claude session ID and model for restart recovery)
llm-console.session-file=.llm-console-session

# CORS (required for MCP Streamable HTTP)
quarkus.http.cors=true
quarkus.http.cors.origins=/.*/

# Anthropic API key (optional; leave empty to use Claude CLI or Web UI prompt)
llm-console.api-key=
